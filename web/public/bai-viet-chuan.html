  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

talReach }} tiếp cận\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HISTORY -->\n    <div style=\"margin-top:24px;background:#fff;border:1px solid #e8ecf2;border-radius:18px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 14px 32px -22px rgba(15,23,42,.2);overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #f1f5f9;\">\n        <div style=\"display:flex;align-items:center;gap:11px;\">\n          <div style=\"display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#f1f5f9;color:#475569;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"m19 9-5 5-4-4-3 3\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:15.5px;font-weight:800;letter-spacing:-.01em;\">Lịch sử đăng bài<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#94a3b8;font-weight:500;\">{{ historyCount }} bài gần đây<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;\">\n          <svg style=\"position:absolute;left:12px;top:50%;transform:translateY(-50%);\" width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n          <input placeholder=\"Lọc bài viết...\" style=\"width:230px;padding:9px 13px 9px 34px;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;color:#0f172a;background:#f8fafc;outline:none;font-family:inherit;\" style-focus=\"border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.12);\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"overflow-x:auto;\">\n        <div style=\"min-width:920px;\">\n          <div style=\"display:grid;grid-template-columns:1.5fr 1.7fr 1.2fr 1fr 1.1fr 1fr;background:#f8fafc;border-bottom:1px solid #f1f5f9;\">\n            <div style=\"padding:12px 24px;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;\">Tiêu đề<\u002Fdiv>\n            <div style=\"padding:12px 16px;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;\">Nội dung<\u002Fdiv>\n            <div style=\"padding:12px 16px;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;\">Link ảnh/video<\u002Fdiv>\n            <div style=\"padding:12px 16px;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;\">Lịch đăng<\u002Fdiv>\n            <div style=\"padding:12px 16px;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;\">Nơi đăng<\u002Fdiv>\n            <div style=\"padding:12px 24px;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;\">Trạng thái<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:1.5fr 1.7fr 1.2fr 1fr 1.1fr 1fr;align-items:center;border-bottom:1px solid #f4f6f9;\" style-hover=\"background:#f8fafc;\">\n              <div style=\"padding:15px 24px;font-size:13.5px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ h.title }}<\u002Fdiv>\n              <div style=\"padding:15px 16px;font-size:13px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ h.content }}<\u002Fdiv>\n              <div style=\"padding:15px 16px;min-width:0;\">\n                <div style=\"display:inline-flex;align-items:center;gap:6px;max-width:100%;font-size:12px;font-weight:600;color:#2563eb;background:#eff6ff;padding:5px 10px;border-radius:8px;\">\n                  <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" style=\"flex-shrink:0;\"><path d=\"M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71\"><\u002Fpath><path d=\"M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71\"><\u002Fpath><\u002Fsvg>\n                  <span style=\"white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ h.media }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:15px 16px;font-size:13px;color:#334155;font-weight:600;white-space:nowrap;\">{{ h.schedule }}<\u002Fdiv>\n              <div style=\"padding:15px 16px;font-size:13px;color:#334155;font-weight:600;\">{{ h.place }}<\u002Fdiv>\n              <div style=\"padding:15px 24px;\">\n                <span style=\"{{ h.badgeStyle }}\">\n                  <span style=\"{{ h.dotStyle }}\"><\u002Fspan>\n                  {{ h.status }}\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    title: \"Review đàn guitar acoustic tầm 3 triệu — đáng tiền không?\",\n    content: \"Mình vừa cầm thử 5 cây acoustic trong tầm giá 3 triệu và bất ngờ với chất âm của 2 mẫu. Cây nào đáng tiền nhất cho người mới tập? Chi tiết bên dưới 👇\",\n    hashtags: \"#guitar #guitarsaithanh #reviewdan #acoustic\",\n    schedule: \"\",\n    mediaUrl: \"\",\n    search: \"\",\n    pages: [\n      { id: 1, name: \"Hội Guitar Sài Gòn\", type: \"Nhóm\", count: \"124.5k thành viên\", initials: \"HG\", color: \"#2563eb\", selected: true },\n      { id: 2, name: \"Guitar Sài Thành\", type: \"Page\", count: \"38.2k theo dõi\", initials: \"GS\", color: \"#7c3aed\", selected: true },\n      { id: 3, name: \"Mua bán đàn Guitar Acoustic\", type: \"Nhóm\", count: \"89.1k thành viên\", initials: \"MB\", color: \"#059669\", selected: true },\n      { id: 4, name: \"Cộng đồng Guitar Việt Nam\", type: \"Nhóm\", count: \"256k thành viên\", initials: \"CĐ\", color: \"#ea580c\", selected: false },\n      { id: 5, name: \"Đam mê Guitar Acoustic\", type: \"Nhóm\", count: \"61.7k thành viên\", initials: \"ĐM\", color: \"#0891b2\", selected: false },\n      { id: 6, name: \"Guitar Shop Review\", type: \"Page\", count: \"12.4k theo dõi\", initials: \"GR\", color: \"#db2777\", selected: false },\n      { id: 7, name: \"Acoustic Lovers VN\", type: \"Nhóm\", count: \"44.3k thành viên\", initials: \"AL\", color: \"#4f46e5\", selected: false },\n      { id: 8, name: \"Học Guitar Online\", type: \"Page\", count: \"73.9k theo dõi\", initials: \"HG\", color: \"#16a34a\", selected: false }\n    ],\n    history: [\n      { title: \"Review đàn guitar acoustic tầm 3 triệu\", content: \"Mình vừa test 5 cây acoustic giá rẻ...\", media: \"anh-review.jpg\", schedule: \"13/6 · 09:30\", place: \"Hội Guitar SG +2\", status: \"Đã đăng\", tone: \"green\" },\n      { title: \"Khuyến mãi cuối tuần — giảm 20%\", content: \"Cuối tuần này shop giảm sốc toàn bộ...\", media: \"youtube.com/watch\", schedule: \"14/6 · 19:00\", place: \"Guitar Sài Thành\", status: \"Đã lên lịch\", tone: \"blue\" },\n      { title: \"Hướng dẫn lên dây đàn cho người mới\", content: \"Video 3 phút hướng dẫn chi tiết...\", media: \"huongdan.mp4\", schedule: \"12/6 · 20:15\", place: \"Cộng đồng Guitar VN\", status: \"Thất bại\", tone: \"red\" },\n      { title: \"Mở bán lô đàn nhập mới\", content: \"Vừa về lô Yamaha F310 chính hãng...\", media: \"lo-dan.png\", schedule: \"11/6 · 08:00\", place: \"5 nhóm\", status: \"Đã đăng\", tone: \"green\" }\n    ]\n  };\n\n  onTitle = (e) => this.setState({ title: e.target.value });\n  onContent = (e) => this.setState({ content: e.target.value });\n  onHashtags = (e) => this.setState({ hashtags: e.target.value });\n  onSchedule = (e) => this.setState({ schedule: e.target.value });\n  onMediaUrl = (e) => this.setState({ mediaUrl: e.target.value });\n  onSearch = (e) => this.setState({ search: e.target.value });\n\n  togglePage = (id) => this.setState(s => ({ pages: s.pages.map(p => p.id === id ? { ...p, selected: !p.selected } : p) }));\n  selectAll = () => this.setState(s => ({ pages: s.pages.map(p => ({ ...p, selected: true })) }));\n  clearAll = () => this.setState(s => ({ pages: s.pages.map(p => ({ ...p, selected: false })) }));\n\n  scheduleTonight = () => this.setState({ schedule: \"2026-06-13T20:00\" });\n  scheduleTomorrow = () => this.setState({ schedule: \"2026-06-14T09:00\" });\n  postNow = () => {};\n  postSchedule = () => {};\n\n  renderVals() {\n    const s = this.state;\n    const q = (s.search || \"\").trim().toLowerCase();\n    const selected = s.pages.filter(p => p.selected);\n\n    const pages = s.pages\n      .filter(p => !q || p.name.toLowerCase().includes(q) || p.type.toLowerCase().includes(q))\n      .map(p => ({\n        ...p,\n        toggle: () => this.togglePage(p.id),\n        rowStyle: \"display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;cursor:pointer;transition:background .12s;\" +\n          (p.selected ? \"background:#eff6ff;\" : \"background:transparent;\"),\n        boxStyle: \"width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;\" +\n          (p.selected ? \"background:#2563eb;border:1px solid #2563eb;\" : \"background:#fff;border:1.5px solid #cbd5e1;\"),\n        tagStyle: \"font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:1px 6px;border-radius:5px;\" +\n          (p.type === \"Page\" ? \"background:#ede9fe;color:#7c3aed;\" : \"background:#dcfce7;color:#16a34a;\")\n      }));\n\n    const tones = {\n      green: { bg: \"#dcfce7\", fg: \"#16a34a\", dot: \"#22c55e\" },\n      blue:  { bg: \"#dbeafe\", fg: \"#2563eb\", dot: \"#3b82f6\" },\n      red:   { bg: \"#fee2e2\", fg: \"#dc2626\", dot: \"#ef4444\" }\n    };\n    const history = s.history.map(h => {\n      const t = tones[h.tone] || tones.blue;\n      return {\n        ...h,\n        badgeStyle: `display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;background:${t.bg};color:${t.fg};white-space:nowrap;`,\n        dotStyle: `width:7px;height:7px;border-radius:50%;background:${t.dot};`\n      };\n    });\n\n    const first = selected[0];\n    const bodyTrim = (s.content || \"\").trim();\n\n    return {\n      title: s.title,\n      content: s.content,\n      hashtags: s.hashtags,\n      schedule: s.schedule,\n      mediaUrl: s.mediaUrl,\n      search: s.search,\n      onTitle: this.onTitle,\n      onContent: this.onContent,\n      onHashtags: this.onHashtags,\n      onSchedule: this.onSchedule,\n      onMediaUrl: this.onMediaUrl,\n      onSearch: this.onSearch,\n      selectAll: this.selectAll,\n      clearAll: this.clearAll,\n      scheduleTonight: this.scheduleTonight,\n      scheduleTomorrow: this.scheduleTomorrow,\n      postNow: this.postNow,\n      postSchedule: this.postSchedule,\n      pages,\n      history,\n      contentCount: (s.content || \"\").length,\n      selectedCount: selected.length,\n      totalReach: selected.length ? \"~\" + selected.length * 47 + \"k\" : \"0\",\n      historyCount: s.history.length,\n      previewPageName: first ? first.name : \"Chọn nơi đăng\",\n      previewInitials: first ? first.initials : \"FB\",\n      previewColor: first ? first.color : \"#94a3b8\",\n      previewTime: s.schedule ? \"Đã lên lịch\" : \"Vừa xong\",\n      previewTitle: (s.title || \"\").trim() || \"Tiêu đề bài viết\",\n      previewBody: bodyTrim || \"Nội dung bài đăng sẽ hiển thị ở đây...\",\n      previewBodyColor: bodyTrim ? \"#050505\" : \"#94a3b8\"\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
